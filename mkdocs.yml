site_name: Python Script Docs
site_description: Auto-generated documentation for scripts under app/
docs_dir: .doc_build/docs
site_dir: dist/html
use_directory_urls: false

theme:
  name: shadcn-lwq
  custom_dir: auto_docs/theme_overrides
  show_title: true
  topbar_sections: true
  show_datetime: false
  katex_options:
    trust: true
  pygments_style:
    light: shadcn-light
    dark: github-dark

plugins:
  - shadcn-lwq/search
  - shadcn-lwq/autonumber:
      prefixes:
        th: Rule
  - shadcn-lwq/excalidraw:
      directory: auto_docs/excalidraw

markdown_extensions:
  - admonition
  - attr_list
  - codehilite:
      guess_lang: false
      use_pygments: true
      css_class: codehilite
  - def_list
  - fenced_code
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.blocks.details
  - pymdownx.blocks.caption
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.tab:
      combine_header_slug: true
      separator: ___
  - pymdownx.progressbar
  - pymdownx.arithmatex:
      generic: true
  - shadcn.extensions.echarts.alpha
  - shadcn.extensions.codexec
  - shadcn.extensions.iconify
  - shadcn.extensions.hover_card

validation:
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: warn
