site_name: Python Script Docs
site_description: Auto-generated documentation for scripts under app/
docs_dir: .doc_build/docs
site_dir: dist/html
use_directory_urls: false

theme:
  name: shadcn
  custom_dir: auto_docs/theme_overrides
  show_title: true
  topbar_sections: true
  show_datetime: false
  pygments_style:
    light: shadcn-light
    dark: github-dark

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - codehilite:
      guess_lang: false
      use_pygments: true
      css_class: codehilite
  - def_list
  - fenced_code
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

validation:
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: warn
