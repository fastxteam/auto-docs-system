<svg version="1.1" width="100%" height="280" viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 18; ry: 18; }
