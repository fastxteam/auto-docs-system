    .text { fill: #0f172a; font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 600; }
    .sub { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 13px; }
    .arrow { stroke: #2563eb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-head" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="box" x="36" y="88" width="180" height="104" rx="18" ry="18" />
  <text class="text" x="126" y="128" text-anchor="middle">Scan app/</text>
  <text class="sub" x="126" y="154" text-anchor="middle">collect README.md and *.md</text>

  <rect class="accent" x="290" y="88" width="180" height="104" rx="18" ry="18" />
  <text class="text" x="380" y="128" text-anchor="middle">Stage Docs</text>
  <text class="sub" x="380" y="154" text-anchor="middle">copy into .doc_build/docs</text>

  <rect class="box" x="544" y="88" width="180" height="104" rx="18" ry="18" />
  <text class="text" x="634" y="128" text-anchor="middle">Build HTML</text>
  <text class="sub" x="634" y="154" text-anchor="middle">render into dist/html</text>

  <path class="arrow" d="M 218 140 L 286 140" marker-end="url(#arrow-head)" />
  <path class="arrow" d="M 472 140 L 540 140" marker-end="url(#arrow-head)" />

  <text class="sub" x="380" y="48" text-anchor="middle">auto_docs/docsite.py + mkdocs-shadcn-lwq</text>
</svg>
